<!DOCTYPE html>
<!-- Wrapper: render the pickup-authorisation mobile page inside a dx-phone iPhone frame. -->
<!-- Captured on a transparent-ish canvas for use in the Loadshift Canada composite. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pickup Auth · Phone Frame</title>
  <style>
    html, body { margin: 0; padding: 0; background: #F1EFE8; }
    .wrap {
      width: 976px;
      height: 864px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F1EFE8;
    }
    .dx-phone {
      position: relative;
      width: 408px;
      height: 812px;
      background: linear-gradient(150deg, #2a2f3a, #14161d);
      border-radius: 46px;
      padding: 13px;
      box-shadow: 0 18px 44px -18px rgba(18, 21, 27, 0.4);
    }
    .dx-phone__notch {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 122px;
      height: 30px;
      background: #000;
      border-radius: 16px;
      z-index: 4;
    }
    .dx-phone__screen {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 34px;
      overflow: hidden;
    }
    .dx-phone iframe {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 34px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="dx-phone">
      <div class="dx-phone__notch"></div>
      <div class="dx-phone__screen">
        <iframe src="http://127.0.0.1:8001/prd/loadshift_canada/product_demo/pages/07-digital-pickup-authorisation.html" title="Pickup authorisation"></iframe>
      </div>
    </div>
  </div>
</body>
</html>
